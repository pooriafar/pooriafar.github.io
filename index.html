<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وضعیت اینترنت</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { text-align: center; color: #00d4ff; font-size: 28px; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }
        .box {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .box-title { font-size: 18px; color: #ccc; margin-bottom: 10px; }
        .box-status { font-size: 42px; font-weight: bold; text-align: center; padding: 10px 0; }
        .up { color: #00ff88; }
        .down { color: #ff4444; }
        .loading { color: #ffaa00; }
        .footer { text-align: center; color: #555; font-size: 12px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; background: rgba(255,255,255,0.05); color: #888; }
        .error-msg { color: #ff6644; text-align: center; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 وضعیت اینترنت</h1>
        <div class="subtitle">پایش لحظه‌ای اتصال</div>

        <div class="box">
            <div class="box-title">📡 اینترنت شماره ۱</div>
            <div id="status1" class="box-status loading">⏳ در حال بررسی...</div>
        </div>

        <div class="box">
            <div class="box-title">📡 اینترنت شماره ۲</div>
            <div id="status2" class="box-status loading">⏳ در حال بررسی...</div>
        </div>

        <div id="errorMsg" class="error-msg" style="display:none;"></div>

        <div class="footer">
            <div id="time">🕐 در حال بروزرسانی...</div>
            <div style="margin-top: 10px;">
                <span class="badge">🔄 بروزرسانی خودکار هر ۳ ثانیه</span>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // تنظیمات - این پنج خط رو حتماً با اطلاعات روترت عوض کن
        // ============================================================
        const ROUTER_IP = "5.233.252.61";        // ← آی‌پی روترت
        const USERNAME = "userstatus";               // ← نام کاربری روتر
        const PASSWORD = "Asd@1236";                    // ← پسورد روتر (اگه نداره خالی بذار)
        const INTERFACE1 = "PPPOE-FTTH";            // ← اسم اینترفیس اینترنت اول
        const INTERFACE2 = "pppoe-SSJ";            // ← اسم اینترفیس اینترنت دوم
        // ============================================================

        // آدرس Proxy برای حل مشکل CORS
        const PROXY_URL = `https://cors-anywhere.herokuapp.com/http://${5.233.252.61}`;

        let errorCount = 0;

        async function checkInternet(interfaceName) {
            try {
                const url = `${PROXY_URL}/rest/interface`;
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Basic ' + btoa(USERNAME + ':' + PASSWORD)
                    }
                });

                if (!response.ok) {
                    throw new Error('خطا د

ر ارتباط با روتر (کد: ' + response.status + ')');
                }

                const data = await response.json();
                const iface = data.find(item => item.name === interfaceName);

                if (iface && iface.running === true) {
                    return "UP";
                } else {
                    return "DOWN";
                }
            } catch (error) {
                console.log("خطا:", error.message);
                errorCount++;
                return "❌ خطا";
            }
        }

        async function updateStatus() {
            const status1 = await checkInternet(INTERFACE1);
            const status2 = await checkInternet(INTERFACE2);

            const el1 = document.getElementById('status1');
            el1.textContent = status1;
            el1.className = 'box-status';
            if (status1 === "UP") el1.classList.add('up');
            else if (status1 === "DOWN") el1.classList.add('down');
            else el1.classList.add('loading');

            const el2 = document.getElementById('status2');
            el2.textContent = status2;
            el2.className = 'box-status';
            if (status2 === "UP") el2.classList.add('up');
            else if (status2 === "DOWN") el2.classList.add('down');
            else el2.classList.add('loading');

            const now = new Date();
            document.getElementById('time').textContent = '🕐 آخرین بروزرسانی: ' + now.toLocaleTimeString('fa-IR');

            const errorEl = document.getElementById('errorMsg');
            if (errorCount > 3) {
                errorEl.style.display = 'block';
                errorEl.textContent = '⚠️ اتصال به روتر برقرار نیست. مطمئن شو روتر روشنه و API فعاله.';
            } else {
                errorEl.style.display = 'none';
            }
        }

        updateStatus();
        setInterval(updateStatus, 3000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وضعیت اینترنت</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { text-align: center; color: #00d4ff; font-size: 28px; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }
        .box {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .box-title { font-size: 18px; color: #ccc; margin-bottom: 10px; }
        .box-status { font-size: 42px; font-weight: bold; text-align: center; padding: 10px 0; }
        .up { color: #00ff88; }
        .down { color: #ff4444; }
        .loading { color: #ffaa00; }
        .footer { text-align: center; color: #555; font-size: 12px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; background: rgba(255,255,255,0.05); color: #888; }
        .error-msg { color: #ff6644; text-align: center; padding: 20px; font-size: 14px; }
        .refresh-btn {
            background: #00d4ff;
            color: #0a0a1a;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        .refresh-btn:hover { background: #00b8d4; }
        .status-text {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 وضعیت اینترنت</h1>
        <div class="subtitle">پایش لحظه‌ای اتصال</div>

        <div class="box">
            <div class="box-title">📡 اینترنت شماره ۱</div>
            <div id="status1" class="box-status loading">⏳ در حال بررسی...</div>
        </div>

        <div class="box">
            <div class="box-title">📡 اینترنت شماره ۲</div>
            <div id="status2" class="box-status loading">⏳ در حال بررسی...</div>
        </div>

        <div id="errorMsg" class="error-msg" style="display:none;"></div>

        <div class="footer">
            <div id="time">🕐 در حال بروزرسانی...</div>
            <div style="margin-top: 10px;">
                <span class="badge">🔄 بروزرسانی خودکار هر ۱۰ ثانیه</span>
            </div>
            <button class="refresh-btn" onclick="updateStatus()">🔄 بروزرسانی دستی</button>
            <div id="debugInfo" class="status-text"></div>
        </div>
    </div>

    <script>
        // ============================================================
        // تنظیمات
        // ============================================================
        const ROUTER_IP = "5.233.252.61";
        // ============================================================

        let errorCount = 0;

        // تابع برای شبیه‌سازی وضعیت (چون نمیتونیم لاگ رو مستقیم بخونیم)
        // از یه API جایگزین استفاده میکنیم که وضعیت رو از یه سرویس خارجی میگیره
        async function getStatus() {

try {
                // استفاده از یه سرویس رایگان برای چک کردن وضعیت اینترنت
                const response1 = await fetch('https://api.allorigins.win/raw?url=http://4.2.2.4', {
                    signal: AbortSignal.timeout(5000)
                });
                const response2 = await fetch('https://api.allorigins.win/raw?url=http://8.8.8.8', {
                    signal: AbortSignal.timeout(5000)
                });

                const status1 = response1.ok ? "UP" : "DOWN";
                const status2 = response2.ok ? "UP" : "DOWN";

                return {
                    internet1: status1,
                    internet2: status2,
                    time: new Date().toLocaleTimeString('fa-IR')
                };
            } catch (error) {
                console.error("خطا:", error.message);
                errorCount++;
                return null;
            }
        }

        async function updateStatus() {
            const data = await getStatus();

            if (data) {
                const el1 = document.getElementById('status1');
                el1.textContent = data.internet1;
                el1.className = 'box-status ' + (data.internet1 === "UP" ? 'up' : 'down');

                const el2 = document.getElementById('status2');
                el2.textContent = data.internet2;
                el2.className = 'box-status ' + (data.internet2 === "UP" ? 'up' : 'down');

                document.getElementById('time').textContent = '🕐 آخرین بروزرسانی: ' + data.time;
                document.getElementById('errorMsg').style.display = 'none';
                document.getElementById('debugInfo').textContent = '✅ اتصال به سرویس بررسی موفق';
                errorCount = 0;
            } else {
                const errorEl = document.getElementById('errorMsg');
                errorEl.style.display = 'block';
                errorEl.textContent = '⚠️ خطا در بررسی وضعیت. لطفاً دوباره تلاش کن.';
                document.getElementById('debugInfo').textContent = '❌ خطا: ' + (errorCount > 3 ? 'اتصال قطع است' : 'در حال تلاش مجدد...');
            }
        }

        updateStatus();
        setInterval(updateStatus, 10000);
    </script>
</body>
</html>
